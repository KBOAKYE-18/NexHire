<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="../CSS/main.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body>
    <div class="main-container">
        <div class="side-bar">
            <div class="logo-box">
                <div class="logo">
                    <img width="50px" src="../images/logo.png" alt="logo.png">
                </div>
            </div>
            <div class="side-options">
                <div class="main">
                    <div class="options" id="Home">
                        <div class="Home-icon"><i class="fa-solid fa-house"></i></div>
                        <div class="profile-text">Home</div>
                    </div>
                    <div class="log-out" id="logout">
                        <div class="logout-icon"> <i class="fa-solid fa-right-from-bracket"></i></div>
                        <div class="profile-text">Log out</div>
                    </div>
                    <div class="profile">
                        <div class="profile-icon" id="profile-initials"></div>
                        <div class="profile-info">
                            <span id="profile-name"></span>
                            <span id="profile-email"></span>
                        </div>
                    </div>
                </div>
                
            </div>
        </div>
        <div class="main">
            <div class="top-bar">
                <div class="title">
                    <h4>Discover jobs</h4>
                </div>
                <div class="input">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <input type="text" class="search">
                </div>
                <div class="hamburger" onclick="toggleMenu()">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
            </div>
            <div class="job-container">
                <div class="job">
                    
                    
                    <div class="body">
                        <!--Use javascript to create as much as needed-->
                        
                    </div>
                </div>
                <div class="description">
                    <div class="upper-part">
                        
                        <div class="details-box">
                            
                        </div>
                        
                    </div>
                    <div class="lower-part">
                        <div class="info-container">

                        </div>
                        
                    </div>
                </div>

            </div>
            
        </div>
    </div>
    <script src="../JS/main.js"></script>
</body>
</html>
