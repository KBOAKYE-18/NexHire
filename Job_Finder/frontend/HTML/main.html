<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="../CSS/main.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body>
    <div class="main-container">
        <div class="side-bar">
            <div class="logo-box">
                <div class="logo">
                    <div class="logo-icon">N×</div>
                    <span class="logo-text">NexHire</span>
                </div>
            </div>
            <div class="side-options">
                <div class="main">
                    <div class="options" id="discover">
                        
                    </div>
                    <div class="options" id="saved-jobs">
                        
                    </div>
                    <div class="options" id="applications">
                       
                    </div>
                    <div class="options" id="analytics">

                    </div>
                </div>
                <div class="profile">
                    <div class="options" id="myprofile"></div>
                    <div class="options" id="alerts"></div>
                    <div class="options" id="settings"></div>
                </div>
            </div>
        </div>
        <div class="main">
            <div class="top-bar">
                <div class="title">
                    <h4>Discover jobs</h4>
                </div>
                <div class="input">
                    <input type="text" class="search">
                </div>
                <div class="hamburger" onclick="toggleMenu()">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
            </div>
            <div class="job-container">
                <div class="job">
                    
                    
                    <div class="body">
                        <!--Use javascript to create as much as needed-->
                        
                    </div>
                </div>
                <div class="description">
                    <div class="upper-part">
                        
                        <div class="details-box">
                            
                        </div>
                        
                    </div>
                    <div class="lower-part">
                        <div class="info-container">

                        </div>
                        
                    </div>
                </div>

            </div>
            
        </div>
    </div>
    <script src="../JS/main.js"></script>
</body>
</html>
