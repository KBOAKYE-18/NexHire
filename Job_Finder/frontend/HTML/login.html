<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log in</title>
    <link rel="stylesheet" href="../CSS/login.css">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body>
    <div class="main-container">
            <div class="half" style="background-color: #111118;">
                <div class="content">
                    <div class="logo">
                        <div class="logo-icon">N×</div>
                        <span class="logo-text">NexHire</span>
                    </div>
                    <div class="box">
                        <h1><span style="color:white;">Find work that</span><span style="color: blueviolet;"> matters to you</span></h1>
                        <p>
                            Connect to top companies and opportunities
                            tailored to your skills experience and ambitions.<br>
                            Your next career move starts here.
                        </p>
                    </div>
                    <div class="box">
                        <div class="stat-row">
                            <div class="stat">
                                <span class="stat-num">48K+</span>
                                <span class="stat-label">Active Jobs</span>
                            </div>
                            <div class="stat-divider"></div>
                            <div class="stat">
                                <span class="stat-num">12K</span>
                                <span class="stat-label">Companies</span>
                            </div>
                            <div class="stat-divider"></div>
                            <div class="stat">
                                <span class="stat-num">94%</span>
                                <span class="stat-label">Placement</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="half" style="background-color: #0a0a0f;">
                <div class="content">
                    <div class="first">
                        <h2>Welcome back</h2>
                        <span>Don't have an account?<a href="../HTML/index.html">sign up for free</a></span>
                    </div>
                    <div>
                        <div class="input">
                            <label for="email">EMAIL ADDRESS</label>
                            <input id="email" type="email">
                            <label for="password">PASSWORD</label>
                            <input id="password" type="password">
                            <a href="">Forgot password?</a>
                            <div class="button">
                                <button id="btn">Sign in</button>
                            </div>
                        </div>
                       
                    </div>
                    
                </div>
            </div>
    </div>
    <script src="../JS/app.js"></script>
</body>
</html>
