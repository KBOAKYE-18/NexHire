<html>
    <!DOCTYPE HTML>
    <head>
        <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <body>
        <div class="signup">
            <div class="leftPanel">

                <h1>Create your Account<h1>
                    <p>Join our community to get access to thousands of Job <span style="color:rgb(82, 244, 53)">Vacancies</span> !</p>
             </div>
        </div>
        <div class="rightPanel">
           <div id="logo"> <p><img src="../images/logo.png" width="30px"><h4> Next Hire</h4></div>

            <div class="phoneInput">
    <select class="countryCode">

        <option value="+44">🇬🇧 +44</option>
        <option value="+234">🇳🇬 +234</option>
    </select>

    <input type="tel" class="phoneNumber" placeholder="Phone Number">
</div>
            <input type="password" id="password" placeholder="Password">

           <button>Join Us</button>
           <p style="text-align: center; font-size: 13px;">Already have an account? <a href="#">Sign in</a></p>
        </div>
        </div>
